<!DOCTYPE html>
<html>
<head>
  <title>Funny Button</title>
  <style>
    body {
      text-align: center;
      margin-top: 100px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4); 
      height: 100vh;
      overflow: hidden;
    }
    h1 {
      color: #fff;
      text-shadow: 2px 2px 4px #333;
    }
    button {
      padding: 12px 24px;
      font-size: 20px;
      margin: 20px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      color: #fff;
      transition: transform 0.3s ease, background 0.3s ease;
    }
    #yes {
      background: #4CAF50;
    }
    #yes:hover {
      transform: scale(1.2);
      background: #45a049;
    }
    #no {
      position: absolute;
      background: #f44336;
      transition: all 0.6s ease; 
      animation: pulse 1.5s infinite; 
    }

    /* Pulsing effect */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1> is  i am your best Friend?</h1>
  <button id="yes">Yes</button>
  <button id="no">No</button>

  <script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");

    
    noBtn.style.left = "200px";
    noBtn.style.top = "200px";

    noBtn.addEventListener("mouseover", () => {
      const x = Math.floor(Math.random() * (window.innerWidth - 120));
      const y = Math.floor(Math.random() * (window.innerHeight - 60));
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });

    yesBtn.addEventListener("click", () => {
      alert("I knew it 😊!");
    });
  </script>
</body>
</html>
